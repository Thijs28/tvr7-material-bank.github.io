<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVR7 Extraction Sequence</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; color: #111; }
        .scrolly-container { display: flex; align-items: flex-start; }
        .text-overlay { width: 35%; padding: 0 5%; position: relative; z-index: 10; }
        .step { height: 100vh; display: flex; align-items: center; opacity: 0.2; transition: opacity 0.5s ease; }
        .step.is-active { opacity: 1; }
        .graphic-container { width: 60%; height: 100vh; position: sticky; top: 0; display: flex; justify-content: center; align-items: center; }
        svg { width: 90%; height: auto; max-height: 90vh; }
        
        /* 1. Default state: Force all layers invisible */
        /* [id^=""] selector matches IDs that START with the string, bypassing Illustrator's suffix errors */
        svg g[id^="state_1"], 
        svg g[id^="state_2"], 
        svg g[id^="state_3"] { 
            opacity: 0; 
            transition: opacity 0.8s ease-in-out; 
            transform: translateZ(0);
        }

        /* 2. Active state: Show only the triggered layer */
        #svg-wrapper[data-current-state="step-1"] svg g[id^="state_1"] { opacity: 1; }
        #svg-wrapper[data-current-state="step-2"] svg g[id^="state_2"] { opacity: 1; }
        #svg-wrapper[data-current-state="step-3"] svg g[id^="state_3"] { opacity: 1; }
    </style>
</head>
<body>

<div class="scrolly-container">
    <div class="text-overlay">
        <div class="step" data-state="step-1">
            <div><h2>1. Pre-Demolition Mass</h2><p>Original volume. 1,098 m³ embedded earthworks.</p></div>
        </div>
        <div class="step" data-state="step-2">
            <div><h2>2. Demolition & Salvage</h2><p>32.21 m³ brickwork and 145.96 m² blue stone highlighted for extraction.</p></div>
        </div>
        <div class="step" data-state="step-3">
            <div><h2>3. Post-Demolition Framework</h2><p>Permanent skeleton. 899 m² joinery removed.</p></div>
        </div>
    </div>
    <div class="graphic-container" id="svg-wrapper" data-current-state="step-1"></div>
</div>

<script>
    fetch('state1-3.txt')
        .then(response => {
            if (!response.ok) throw new Error("File not found");
            return response.text();
        })
        .then(svgCode => {
            document.getElementById('svg-wrapper').innerHTML = svgCode;
            initScroll();
        })
        .catch(error => console.error("Fetch error:", error));

    function initScroll() {
        const steps = document.querySelectorAll('.step');
        const svgWrapper = document.getElementById('svg-wrapper');
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    steps.forEach(s => s.classList.remove('is-active'));
                    entry.target.classList.add('is-active');
                    
                    const state = entry.target.getAttribute('data-state');
                    svgWrapper.setAttribute('data-current-state', state);
                }
            });
        }, { threshold: 0.5 });

        steps.forEach(step => observer.observe(step));
    }
</script>

</body>
</html>
