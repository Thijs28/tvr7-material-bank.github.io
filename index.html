<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVR7 Extraction Sequence</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; color: #111; }
        .scrolly-container { display: flex; align-items: flex-start; }
        .text-overlay { width: 35%; padding: 0 5%; position: relative; z-index: 10; }
        .step { height: 100vh; display: flex; align-items: center; opacity: 0.2; transition: opacity 0.5s ease; }
        .step.is-active { opacity: 1; }
        .graphic-container { width: 60%; height: 100vh; position: sticky; top: 0; display: flex; justify-content: center; align-items: center; }
        svg { width: 90%; height: auto; max-height: 90vh; }
        
        #red_front, #red_back, #black_post { transition: opacity 1.2s ease; }
        #red_front *, #red_back *, #black_post * { transition: stroke 1.2s ease; }

        /* State 1: Complete drawing, all black */
        .state-1 #red_front, .state-1 #black_post, .state-1 #red_back { opacity: 1; }
        .state-1 #red_front *, .state-1 #red_back *, .state-1 #black_post * { stroke: #111 !important; }

        /* State 2: Demolished in red, retained in grey */
        .state-2 #red_front, .state-2 #black_post, .state-2 #red_back { opacity: 1; }
        .state-2 #red_front *, .state-2 #red_back * { stroke: #ed1c24 !important; }
        .state-2 #black_post * { stroke: #bbbbbb !important; }

        /* State 3: Post-demolition, all black */
        .state-3 #red_front, .state-3 #red_back { opacity: 0; }
        .state-3 #black_post { opacity: 1; }
        .state-3 #black_post * { stroke: #111 !important; }
    </style>
</head>
<body>

<div class="scrolly-container">
    <div class="text-overlay">
        <div class="step" data-state="state-1">
            <div><h2>1. Pre-Demolition Mass</h2><p>Original volume. 1,098 m³ embedded earthworks.</p></div>
        </div>
        <div class="step" data-state="state-2">
            <div><h2>2. Demolition & Salvage</h2><p>32.21 m³ brickwork and 145.96 m² blue stone highlighted for extraction.</p></div>
        </div>
        <div class="step" data-state="state-3">
            <div><h2>3. Post-Demolition Framework</h2><p>Permanent skeleton. 899 m² joinery removed.</p></div>
        </div>
    </div>
    <div class="graphic-container state-1" id="svg-wrapper"></div>
</div>

<script>
    fetch('layers.txt')
        .then(response => response.text())
        .then(svgCode => {
            document.getElementById('svg-wrapper').innerHTML = svgCode;
            initScroll();
        });

    function initScroll() {
        const steps = document.querySelectorAll('.step');
        const svgWrapper = document.getElementById('svg-wrapper');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    steps.forEach(s => s.classList.remove('is-active'));
                    entry.target.classList.add('is-active');
                    svgWrapper.className = `graphic-container ${entry.target.getAttribute('data-state')}`;
                }
            });
        }, { rootMargin: '-50% 0px -50% 0px' });
        steps.forEach(step => observer.observe(step));
    }
</script>

</body>
</html>
